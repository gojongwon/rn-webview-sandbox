<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>웹뷰 테스트 · Expo Go</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --fg: #f5f5f7;
        --muted: #9ca3af;
        --card: #16161c;
        --accent: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui,
          sans-serif;
        background:
          radial-gradient(1200px 600px at 50% -10%, #2a2a38 0%, transparent 55%),
          var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
        letter-spacing: -0.03em;
        font-weight: 700;
      }

      .lead {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .qr-wrap {
        background: var(--card);
        border: 1px solid #2a2a33;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .qr-wrap img {
        width: min(260px, 100%);
        height: auto;
        display: block;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
      }

      .req {
        margin: 0 0 16px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #1c1c24;
        border: 1px solid #333344;
        color: #e5e7eb;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .req strong {
        color: #fff;
      }

      .stores {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      a.btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--bg);
        background: var(--accent);
      }

      a.btn.secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid #3f3f4a;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .open-link {
        display: inline-block;
        margin-top: 14px;
        color: #93c5fd;
        font-size: 0.875rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>웹뷰 테스트</h1>
      <p class="lead">QR을 스캔하면 Expo Go에서 웹뷰 테스트 앱이 열립니다.</p>

      <p class="req">
        <strong>필수:</strong> 스마트폰에 Expo Go가 설치되어 있어야 합니다.
        Expo SDK 54와 맞는 최신 Expo Go를 사용해 주세요.
      </p>

      <div class="stores">
        <a
          class="btn"
          href="https://apps.apple.com/app/expo-go/id982107779"
          target="_blank"
          rel="noopener noreferrer"
          >App Store</a
        >
        <a
          class="btn"
          href="https://play.google.com/store/apps/details?id=host.exp.exponent"
          target="_blank"
          rel="noopener noreferrer"
          >Google Play</a
        >
      </div>

      <div class="qr-wrap">
        <img
          src="https://qr.expo.dev/eas-update?projectId=4eaf7758-b15c-4e58-bd65-17a94c5476e2&runtimeVersion=exposdk:54.0.0&channel=preview"
          alt="Expo Go QR code"
          width="260"
          height="260"
        />
      </div>

      <p class="hint">카메라 또는 Expo Go로 QR을 스캔하세요.</p>
      <a
        class="open-link"
        href="exp://u.expo.dev/4eaf7758-b15c-4e58-bd65-17a94c5476e2?runtime-version=exposdk%3A54.0.0&channel-name=preview"
        >스캔이 안 되면 이 링크를 탭하세요</a
      >
    </main>
  </body>
</html>
