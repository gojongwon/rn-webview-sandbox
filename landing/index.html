<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>웹뷰 테스트 · Android</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --fg: #f5f5f7;
        --muted: #9ca3af;
        --card: #16161c;
        --accent: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui,
          sans-serif;
        background:
          radial-gradient(1200px 600px at 50% -10%, #2a2a38 0%, transparent 55%),
          var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
        letter-spacing: -0.03em;
        font-weight: 700;
      }

      .lead {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .qr-wrap {
        background: var(--card);
        border: 1px solid #2a2a33;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .qr-wrap img {
        width: min(260px, 100%);
        height: auto;
        display: block;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
      }

      .req {
        margin: 0 0 16px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #1c1c24;
        border: 1px solid #333344;
        color: #e5e7eb;
        font-size: 0.9rem;
        line-height: 1.45;
        text-align: left;
      }

      .req strong {
        color: #fff;
      }

      .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      a.btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--bg);
        background: var(--accent);
      }

      a.btn.secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid #3f3f4a;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>웹뷰 테스트</h1>
      <p class="lead">Android APK를 설치한 뒤 앱을 실행하세요. Expo Go는 필요 없습니다.</p>

      <p class="req">
        <strong>Android 전용</strong> 프리뷰 앱입니다. QR을 스캔하거나 아래
        버튼으로 APK를 설치하세요. 이미 설치했다면 앱만 다시 실행하면 최신
        버전을 받습니다.
      </p>

      <div class="actions">
        <a
          class="btn"
          href="https://expo.dev/artifacts/eas/t5YYggpdmLL04zBUbDnxAdy-6mwXFv0HyxsejrE9490.apk"
          >APK 다운로드</a
        >
        <a
          class="btn secondary"
          href="https://expo.dev/accounts/gojongwon1122/projects/rn-webview-sandbox/builds/7cff551c-eee8-4a52-8dcb-fc84d8a96105"
          target="_blank"
          rel="noopener noreferrer"
          >빌드 상세</a
        >
      </div>

      <div class="qr-wrap">
        <img
          src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&amp;data=https%3A%2F%2Fexpo.dev%2Fartifacts%2Feas%2Ft5YYggpdmLL04zBUbDnxAdy-6mwXFv0HyxsejrE9490.apk"
          alt="APK install QR code"
          width="260"
          height="260"
        />
      </div>

      <p class="hint">
        설치 시 “알 수 없는 앱” 허용이 필요할 수 있습니다. 설치 후
        rn-webview-sandbox 앱을 실행하세요.
      </p>
    </main>
  </body>
</html>
