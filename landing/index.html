<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>웹뷰 테스트 앱 설치</title>
    <style>
      :root {
        --bg: #0b0b0f;
        --fg: #f5f5f7;
        --muted: #9ca3af;
        --card: #16161c;
        --accent: #ffffff;
        --warn: #fbbf24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui,
          sans-serif;
        background:
          radial-gradient(1200px 600px at 50% -10%, #2a2a38 0%, transparent 55%),
          var(--bg);
        color: var(--fg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        text-align: center;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
        letter-spacing: -0.03em;
        font-weight: 700;
      }

      .lead {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .qr-wrap {
        background: var(--card);
        border: 1px solid #2a2a33;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .qr-wrap img {
        width: min(260px, 100%);
        height: auto;
        display: block;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
      }

      .req {
        margin: 0 0 16px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #1c1c24;
        border: 1px solid #333344;
        color: #e5e7eb;
        font-size: 0.9rem;
        line-height: 1.45;
        text-align: left;
      }

      .req strong {
        color: #fff;
      }

      .warn {
        margin: 0 0 16px;
        padding: 14px 16px;
        border-radius: 14px;
        background: #2a2110;
        border: 1px solid #5c4a1f;
        color: #fde68a;
        font-size: 0.85rem;
        line-height: 1.45;
        text-align: left;
      }

      .stores {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      a.btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--bg);
        background: var(--accent);
      }

      a.btn.secondary {
        background: transparent;
        color: var(--fg);
        border: 1px solid #3f3f4a;
      }

      .hint {
        margin: 0;
        color: var(--muted);
        font-size: 0.8rem;
        line-height: 1.45;
      }

      .open-link {
        display: inline-block;
        margin-top: 14px;
        color: #93c5fd;
        font-size: 0.875rem;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>웹뷰 테스트</h1>
      <p class="lead">
        아래 버튼으로 테스트 앱을 설치하세요. 설치는 한 번만 하면 되고, 이후
        내용은 자동으로 갱신됩니다.
      </p>

      <div class="stores">
        <a
          class="btn"
          href="https://github.com/gojongwon/rn-webview-sandbox/releases/latest/download/rn-webview-sandbox.apk"
          target="_blank"
          rel="noopener noreferrer"
          >Android 앱 설치 (APK)</a
        >
      </div>

      <p class="req">
        <strong>Android:</strong> 위 버튼을 눌러 APK를 설치하세요. 설치 시
        “출처를 알 수 없는 앱” 허용이 필요할 수 있습니다.
      </p>

      <p class="warn">
        <strong>iOS:</strong> 준비 중입니다. 참여를 원하시면 배포자에게
        문의해주세요.
      </p>
    </main>
  </body>
</html>
